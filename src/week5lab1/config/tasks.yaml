# Strictly separated task definitions.
#
# Three task families live here:
#
# 1. "Research -> Write -> Edit" style decomposition (analyze_user_task ->
#    analyze_item_task -> predict_review_task). Used by the default
#    ``Week5Lab1`` sequential crew. Context chaining happens via the
#    sequential Process in ``crew.py``: ``predict_review_task`` implicitly
#    receives the outputs of the two analyze tasks.
#
# 2. Collaborative specialists — the collab crew also reuses the family (1)
#    task lineup under ``Process.sequential``. Pattern 2 "collaboration"
#    comes from ``allow_delegation=True`` on every agent (plus the extra
#    eda_researcher / web_researcher peers), not from squeezing the whole
#    workflow into a single task. Keeping three tasks guarantees the final
#    answer is a clean JSON from ``prediction_modeler``.
#
# 3. Hierarchical orchestration — the hierarchical crew reuses the same
#    three tasks from family (1) under ``Process.hierarchical`` with an
#    explicit ``crew_manager`` agent. This keeps the final output identical
#    in shape to the sequential crew (emitted by ``prediction_modeler``)
#    while still letting the manager side-delegate to eda_researcher /
#    editor / web_researcher via CrewAI's built-in delegation tools.

# -----------------------------------------------------------------------
# Pattern 1 — Research -> Write -> Edit (sequential, explicit context)
# -----------------------------------------------------------------------

analyze_user_task:
  description: >
    Use the search_user_profile_data tool to find information about user {user_id}.
    You MUST call the tool with a natural language search_query string, e.g.:
    Action: search_user_profile_data
    Action Input: {{"search_query": "What are the review habits and average stars for user {user_id}"}}
    Also use search_historical_reviews_data to find past reviews written by this user.
    Understand their average stars, what words they commonly use, and their general sentiment.
    If a concept is unclear, you may delegate a focused question to the
    eda_researcher for a distribution anchor.
  expected_output: >
    A detailed markdown profile of user {user_id}'s preferences and rating habits,
    including: average_stars, review_count, 3-5 recurring themes (with
    short paraphrased quotes), and a one-line tone descriptor.
  agent: user_analyst

analyze_item_task:
  description: >
    Use the search_restaurant_feature_data tool to find information about business {item_id}.
    You MUST call the tool with a natural language search_query string, e.g.:
    Action: search_restaurant_feature_data
    Action Input: {{"search_query": "What are the categories and star rating for business {item_id}"}}
    Also use search_historical_reviews_data to find past reviews about this business.
    Understand its categories, attributes, and overall public sentiment.
  expected_output: >
    A detailed markdown report of business {item_id}'s features, pros, and cons,
    including: name, city, categories, aggregate stars, review_count, and 3-5
    recurring themes (with short paraphrased quotes).
  agent: item_analyst

predict_review_task:
  description: >
    Using the user profile and the item report produced by the previous tasks,
    predict the stars (1.0 to 5.0) and write the review text.
    You MUST base your prediction on the actual data retrieved by the previous
    agents. Do NOT say the data was not found.
    Consider whether the restaurant's features align with the user's historical
    preferences, and use the user's average_stars as the main calibration
    anchor.
  expected_output: >
    Output ONLY a valid JSON object with exactly two keys: "stars" (a float
    from 1.0 to 5.0) and "review" (a string).
    Use single curly braces. Example: {"stars": 4.5, "review": "The review text..."}
    Do NOT include any text before or after the JSON object. Do NOT use double
    curly braces.
  agent: prediction_modeler

# -----------------------------------------------------------------------
# Pattern 2 — Collaborative specialists (sequential process, shared tasks)
# -----------------------------------------------------------------------
#
# The collab crew reuses the Pattern 1 task lineup verbatim. Collaboration
# still happens via ``allow_delegation=true`` on every agent (see
# config/agents.yaml) — an analyst can pause mid-task to ask a peer a
# focused question — but the final answer is still produced by
# ``prediction_modeler`` at the end of ``predict_review_task`` so the
# output schema stays identical across all three crew modes.

# -----------------------------------------------------------------------
# Pattern 3 — Hierarchical (manager agent orchestrates the same 3 tasks)
# -----------------------------------------------------------------------
#
# Under ``Process.hierarchical`` the manager still coordinates, but we reuse
# the sequential lineup (analyze_user_task, analyze_item_task,
# predict_review_task) so the FINAL output is emitted by
# ``prediction_modeler`` — identical schema and output_file behaviour to the
# sequential crew. The manager can still side-delegate to eda_researcher /
# editor / web_researcher via the built-in "Delegate work to coworker" /
# "Ask question to coworker" tools.
